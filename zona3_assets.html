<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zona 3 — Assets</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0e;
  --surface:#161616;
  --surface2:#1e1e1e;
  --surface3:#252525;
  --border:#2a2a2a;
  --border2:#333;
  --text:#f0ede8;
  --text2:#999;
  --text3:#555;
  --accent:#c4a882;
  --accent2:#8a6f52;
  --peak:#1D9E75;
  --valley:#378ADD;
  --trans:#EF9F27;
  --danger:#E24B4A;
  --mono:'DM Mono',monospace;
  --serif:'Fraunces',serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;min-height:100vh}

.layout{display:grid;grid-template-columns:260px 1fr;height:100vh;overflow:hidden}

.sidebar{background:var(--surface);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:16px;border-bottom:0.5px solid var(--border)}
.sidebar-label{font-size:9px;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px}
.sidebar-title{font-family:var(--serif);font-size:16px;font-weight:300;color:var(--text);line-height:1.3}
.brand-strip{margin-top:10px;padding:8px 10px;background:var(--surface2);border-radius:6px;display:flex;align-items:center;gap:8px}
.brand-colors{display:flex;gap:3px}
.brand-dot{width:10px;height:10px;border-radius:50%}
.brand-name{font-size:10px;color:var(--text2)}
.brand-status{margin-left:auto;font-size:9px;color:var(--peak)}

.slots-list{flex:1;overflow-y:auto;padding:8px}
.slots-list::-webkit-scrollbar{width:3px}
.slots-list::-webkit-scrollbar-thumb{background:var(--border2)}

.slot-item{padding:10px 12px;border-radius:6px;cursor:pointer;margin-bottom:4px;border:0.5px solid transparent;transition:all 0.15s}
.slot-item:hover{background:var(--surface2);border-color:var(--border)}
.slot-item.active{background:var(--surface2);border-color:var(--accent2)}
.slot-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.slot-num{font-size:10px;color:var(--text3);min-width:20px}
.slot-label{font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.slot-status{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.s-approved{background:var(--peak)}
.s-pending{background:var(--trans)}
.s-empty{background:var(--border2)}
.slot-meta{display:flex;gap:6px;align-items:center}
.slot-type-pill{font-size:8px;padding:1px 6px;border-radius:4px;font-weight:500}
.pill-peak{background:rgba(29,158,117,0.15);color:var(--peak)}
.pill-valley{background:rgba(55,138,221,0.15);color:var(--valley)}
.pill-transition{background:rgba(239,159,39,0.15);color:var(--trans)}
.slot-emotion{font-size:9px;color:var(--text3)}

.session-footer{padding:12px;border-top:0.5px solid var(--border)}
.cost-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.cost-label{font-size:10px;color:var(--text3)}
.cost-val{font-size:13px;font-weight:500;color:var(--accent)}
.progress-bar{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:2px;background:var(--peak);transition:width 0.4s}

.main{display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:16px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.main-slide-badge{font-size:10px;padding:3px 10px;border-radius:4px;background:var(--surface2);color:var(--text2);border:0.5px solid var(--border)}
.main-topic{font-family:var(--serif);font-size:18px;font-weight:300;font-style:italic;color:var(--text)}
.curve-point-info{display:flex;gap:8px;align-items:center}
.cp-type{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500}
.cp-intensity{font-size:11px;color:var(--text2)}

.main-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:20px}
.main-body::-webkit-scrollbar{width:3px}
.main-body::-webkit-scrollbar-thumb{background:var(--border2)}

.section-head{font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-head::after{content:'';flex:1;height:0.5px;background:var(--border)}

.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.source-card{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;overflow:hidden}
.source-header{padding:10px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.source-name{font-size:10px;font-weight:500;color:var(--text2);letter-spacing:0.05em;text-transform:uppercase}
.source-badge{font-size:8px;padding:2px 6px;border-radius:3px}
.sb-active{background:rgba(29,158,117,0.15);color:var(--peak)}
.sb-indexed{background:rgba(196,168,130,0.15);color:var(--accent)}
.sb-waiting{background:rgba(85,85,85,0.2);color:var(--text3)}
.source-body{padding:12px}

.drive-asset{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;margin-bottom:4px;border:0.5px solid var(--border);cursor:pointer;transition:all 0.15s}
.drive-asset:hover{border-color:var(--accent2);background:var(--surface2)}
.drive-asset.selected{border-color:var(--peak);background:rgba(29,158,117,0.08)}
.drive-thumb{width:36px;height:28px;border-radius:3px;object-fit:cover;background:var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3)}
.drive-info{flex:1;min-width:0}
.drive-name{font-size:10px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drive-score{font-size:9px;color:var(--text3);margin-top:1px}
.drive-check{width:14px;height:14px;border-radius:3px;border:0.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.drive-check.on{background:var(--peak);border-color:var(--peak)}
.drive-empty{font-size:11px;color:var(--text3);text-align:center;padding:12px 0}

.pinterest-area{display:flex;flex-direction:column;gap:8px}
.pin-input-wrap{display:flex;gap:6px}
.pin-input{flex:1;background:var(--surface2);border:0.5px solid var(--border2);border-radius:5px;padding:7px 10px;font-family:var(--mono);font-size:11px;color:var(--text);outline:none}
.pin-input:focus{border-color:var(--accent2)}
.pin-btn{padding:7px 12px;background:var(--surface3);border:0.5px solid var(--border2);border-radius:5px;color:var(--text2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.pin-btn:hover{border-color:var(--accent2);color:var(--accent)}
.mood-extracted{background:var(--surface2);border:0.5px solid var(--border);border-radius:6px;padding:10px}
.mood-palette{display:flex;gap:4px;margin-bottom:8px}
.mood-swatch{height:20px;flex:1;border-radius:3px}
.mood-tags{display:flex;gap:4px;flex-wrap:wrap}
.mood-tag{font-size:9px;padding:2px 6px;background:var(--surface3);border-radius:3px;color:var(--text2)}
.mood-score{font-size:10px;color:var(--peak);margin-top:6px}

.gen-area{display:flex;flex-direction:column;gap:8px}
.prompt-display{background:var(--surface2);border:0.5px solid var(--border);border-radius:5px;padding:10px;font-size:10px;color:var(--text2);line-height:1.6;font-family:var(--mono)}
.prompt-highlight{color:var(--accent)}
.engine-select{display:flex;gap:5px;flex-wrap:wrap}
.engine-btn{font-size:9px;padding:3px 8px;border-radius:4px;border:0.5px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--mono);transition:all 0.15s}
.engine-btn:hover{border-color:var(--accent2);color:var(--accent)}
.engine-btn.active{background:var(--surface3);border-color:var(--accent2);color:var(--accent)}
.gen-btn{width:100%;padding:8px;background:var(--accent2);border:none;border-radius:5px;color:var(--text);font-family:var(--mono);font-size:11px;cursor:pointer;transition:opacity 0.15s;font-weight:500}
.gen-btn:hover{opacity:0.85}
.gen-btn.generating{opacity:0.6;cursor:not-allowed}
.cost-estimate{font-size:9px;color:var(--text3);text-align:right;margin-top:4px}

.variants-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.variant-card{border-radius:6px;overflow:hidden;border:0.5px solid var(--border);cursor:pointer;transition:border-color 0.15s;background:var(--surface)}
.variant-card:hover{border-color:var(--accent2)}
.variant-card.selected{border:1.5px solid var(--peak)}
.variant-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3)}
.v-bg1{background:linear-gradient(135deg,#1a1208,#3d2b0f)}
.v-bg2{background:linear-gradient(135deg,#0d1a14,#0f3020)}
.v-bg3{background:linear-gradient(135deg,#1a1515,#2d1010)}
.variant-foot{padding:6px 8px;display:flex;justify-content:space-between;align-items:center}
.var-label{font-size:9px;color:var(--text3)}
.var-score{font-size:10px;font-weight:500;color:var(--peak)}
.compliance-row{display:flex;gap:6px;align-items:center;margin-top:4px}
.compliance-chip{font-size:8px;padding:1px 6px;border-radius:3px;background:rgba(29,158,117,0.12);color:var(--peak)}
.compliance-chip.warn{background:rgba(239,159,39,0.12);color:var(--trans)}

.final-preview{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;overflow:hidden}
.final-header{padding:10px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.final-title{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em}
.final-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.final-thumb-area{padding:14px;border-right:0.5px solid var(--border)}
.final-thumb{width:100%;aspect-ratio:16/9;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3)}
.final-meta{padding:14px;display:flex;flex-direction:column;gap:10px}
.meta-row{display:flex;justify-content:space-between;font-size:11px}
.meta-key{color:var(--text3)}
.meta-val{font-weight:500;color:var(--text)}
.score-bar-wrap{display:flex;align-items:center;gap:6px}
.score-mini-bar{flex:1;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.score-mini-fill{height:100%;border-radius:2px;background:var(--peak)}
.approve-btn{margin-top:auto;width:100%;padding:8px;background:var(--peak);border:none;border-radius:5px;color:#fff;font-family:var(--mono);font-size:11px;cursor:pointer;font-weight:500;transition:opacity 0.15s}
.approve-btn:hover{opacity:0.85}
.approve-btn.approved{background:var(--surface3);color:var(--peak);border:0.5px solid var(--peak);cursor:default}

.generating-overlay{display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:8px}
.generating-overlay.show{display:flex}
.gen-spinner{width:24px;height:24px;border:1.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.gen-status{font-size:11px;color:var(--text2)}
.gen-engine-tag{font-size:9px;color:var(--text3)}
</style>
</head>
<body>

<div class="layout">

  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-label">zona 3</div>
      <div class="sidebar-title">gestión<br>de assets</div>
      <div class="brand-strip">
        <div class="brand-colors">
          <div class="brand-dot" style="background:#1A1A2E"></div>
          <div class="brand-dot" style="background:#0F3460"></div>
          <div class="brand-dot" style="background:#E94560"></div>
          <div class="brand-dot" style="background:#F5F5F5"></div>
        </div>
        <span class="brand-name">brand book v2.3</span>
        <span class="brand-status">activo</span>
      </div>
    </div>

    <div class="slots-list" id="slotsList"></div>

    <div class="session-footer">
      <div class="cost-row">
        <span class="cost-label">costo sesión</span>
        <span class="cost-val">$0.61 USD</span>
      </div>
      <div class="cost-row">
        <span class="cost-label">slots completados</span>
        <span class="cost-val" style="font-size:11px;color:var(--text2)">4 / 6</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:66%"></div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="main-header">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <span class="main-slide-badge" id="headerBadge">slide 1</span>
          <div class="curve-point-info" id="curveInfo"></div>
        </div>
        <div class="main-topic" id="headerTopic">brecha de inclusión financiera LATAM</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="pin-btn" onclick="prevSlot()">← anterior</button>
        <button class="pin-btn" onclick="nextSlot()">siguiente →</button>
      </div>
    </div>

    <div class="main-body" id="mainBody"></div>
  </div>

</div>

<script>
const slots = [
  {slide:1,label:'brecha de inclusión financiera',fullLabel:'brecha de inclusión financiera LATAM',type:'peak',emotion:'curiosidad',intensity:7,
   driveAssets:[],driveNote:'sin coincidencias en drive (score < 0.70)',
   pinUrl:'https://pinterest.com/pin/xxx',
   mood:{palette:['#1a1208','#c4a882','#e8e0d0','#3d2b0f'],style:'fotografía documental, alto contraste',composition:'sujeto centrado, fondo desenfocado',score:9.1},
   engine:'flux-pro-1.1',engineCost:0.04,
   variants:[{bg:'v-bg1',brand:9.2,emotion:8.8,compliance:['paleta ok','personas reales','no ilustración']},
             {bg:'v-bg2',brand:8.7,emotion:9.1,compliance:['paleta ok','personas reales']},
             {bg:'v-bg3',brand:7.9,emotion:7.4,compliance:['paleta ok','personas reales','composición débil']}],
   selectedVariant:0,approved:false,assetType:'image'},
  {slide:2,label:'tamaño de mercado $150B',fullLabel:'tamaño de mercado $150B',type:'valley',emotion:'atención fría',intensity:4,
   driveAssets:[{name:'informe_mercado_2024.jpg',score:'0.74',type:'img'}],driveNote:null,
   pinUrl:null,
   mood:{palette:['#0d1a14','#1a1a2e','#e0e0e0','#888888'],style:'minimalista, datos duros',composition:'centrado, mucho espacio negativo',score:8.2},
   engine:'flux-schnell',engineCost:0.008,
   variants:[{bg:'v-bg2',brand:9.0,emotion:7.8,compliance:['paleta ok','minimalista','datos claros']},
             {bg:'v-bg1',brand:8.3,emotion:7.2,compliance:['paleta ok']},
             {bg:'v-bg3',brand:7.5,emotion:6.9,compliance:['paleta ok','contraste bajo']}],
   selectedVariant:0,approved:true,assetType:'image'},
  {slide:3,label:'solución propuesta',fullLabel:'solución propuesta',type:'transition',emotion:'esperanza',intensity:6,
   driveAssets:[{name:'producto_demo_v2.mp4',score:'0.81',type:'vid'},{name:'interfaz_app.png',score:'0.76',type:'img'}],driveNote:null,
   pinUrl:'https://pinterest.com/pin/yyy',
   mood:{palette:['#0f3020','#1D9E75','#e8f5ee','#c4a882'],style:'tecnología limpia, optimista',composition:'interfaz prominente, persona al fondo',score:8.7},
   engine:'flux-pro-1.1',engineCost:0.04,
   variants:[{bg:'v-bg2',brand:9.4,emotion:8.6,compliance:['paleta ok','personas reales','tech visible']},
             {bg:'v-bg1',brand:8.1,emotion:7.9,compliance:['paleta ok']},
             {bg:'v-bg3',brand:7.2,emotion:7.0,compliance:['paleta ok','tono frío']}],
   selectedVariant:0,approved:true,assetType:'image'},
  {slide:4,label:'caso cliente Banco X',fullLabel:'caso cliente Banco X',type:'peak',emotion:'confianza emergente',intensity:8,
   driveAssets:[{name:'cliente_banco_x_entrevista.mp4',score:'0.88',type:'vid',recommended:true},{name:'banco_x_oficina.jpg',score:'0.72',type:'img'}],driveNote:null,
   pinUrl:null,
   mood:{palette:['#1a1515','#0F3460','#f5f5f5','#c4a882'],style:'corporativo cálido, auténtico',composition:'plano medio, contacto visual directo',score:9.0},
   engine:'none',engineCost:0,
   variants:[],selectedVariant:-1,approved:true,assetType:'video',
   driveSelected:0},
  {slide:5,label:'tracción ARR $2.1M',fullLabel:'tracción ARR $2.1M',type:'valley',emotion:'análisis',intensity:5,
   driveAssets:[{name:'dashboard_metricas_q3.png',score:'0.79',type:'img'}],driveNote:null,
   pinUrl:null,
   mood:{palette:['#0e0e0e','#1a1a2e','#378ADD','#f0f0f0'],style:'data viz minimalista',composition:'gráfico central, fondo oscuro',score:8.5},
   engine:'flux-schnell',engineCost:0.008,
   variants:[{bg:'v-bg2',brand:9.1,emotion:8.0,compliance:['paleta ok','dato central','una variable']},
             {bg:'v-bg1',brand:7.8,emotion:7.5,compliance:['paleta ok']},
             {bg:'v-bg3',brand:7.0,emotion:6.8,compliance:['paleta ok','legibilidad baja']}],
   selectedVariant:0,approved:false,assetType:'image'},
  {slide:6,label:'roadmap 18 meses',fullLabel:'roadmap 18 meses',type:'peak',emotion:'excitación',intensity:9,
   driveAssets:[],driveNote:'sin coincidencias en drive (score < 0.70)',
   pinUrl:'https://pinterest.com/pin/zzz',
   mood:{palette:['#1a0820','#E94560','#c4a882','#0e0e0e'],style:'visión expansiva, aspiracional',composition:'horizonte abierto, escala',score:9.3},
   engine:'runway-gen3-alpha-turbo',engineCost:0.40,
   variants:[{bg:'v-bg3',brand:9.5,emotion:9.2,compliance:['paleta ok','personas reales','movimiento sutil']},
             {bg:'v-bg1',brand:8.9,emotion:8.7,compliance:['paleta ok','movimiento ok']},
             {bg:'v-bg2',brand:8.2,emotion:8.0,compliance:['paleta ok']}],
   selectedVariant:0,approved:false,assetType:'video'},
];

const typeColors = {peak:'var(--peak)',valley:'var(--valley)',transition:'var(--trans)'};
const typeLabel = {peak:'pico',valley:'valle',transition:'transición'};
const typePillClass = {peak:'pill-peak',valley:'pill-valley',transition:'pill-transition'};

let activeSlot = 0;
let generating = false;

function renderSidebar(){
  const list = document.getElementById('slotsList');
  list.innerHTML = '';
  slots.forEach((s,i) => {
    const el = document.createElement('div');
    el.className = 'slot-item' + (i===activeSlot?' active':'');
    const statusClass = s.approved ? 's-approved' : (s.variants.length > 0 || (s.driveAssets && s.driveSelected !== undefined) ? 's-pending' : 's-empty');
    el.innerHTML = `
      <div class="slot-top">
        <span class="slot-num">S${s.slide}</span>
        <span class="slot-label">${s.label}</span>
        <span class="slot-status ${statusClass}"></span>
      </div>
      <div class="slot-meta">
        <span class="slot-type-pill ${typePillClass[s.type]}">${typeLabel[s.type]}</span>
        <span class="slot-emotion">${s.emotion} · ${s.intensity}/10</span>
      </div>`;
    el.addEventListener('click',()=>{activeSlot=i;render();});
    list.appendChild(el);
  });
}

function renderHeader(){
  const s = slots[activeSlot];
  document.getElementById('headerBadge').textContent = `slide ${s.slide}`;
  document.getElementById('headerTopic').textContent = s.fullLabel;
  document.getElementById('curveInfo').innerHTML = `
    <span class="cp-type" style="background:${s.type==='peak'?'rgba(29,158,117,0.15)':s.type==='valley'?'rgba(55,138,221,0.15)':'rgba(239,159,39,0.15)'};color:${typeColors[s.type]}">${typeLabel[s.type]}</span>
    <span class="cp-intensity">${s.emotion} · intensidad ${s.intensity}/10</span>
    <span class="cp-intensity" style="color:var(--text3)">${s.assetType === 'video' ? 'video' : 'imagen'}</span>`;
}

function renderMain(){
  const s = slots[activeSlot];
  const body = document.getElementById('mainBody');

  const isDriveSelected = s.driveSelected !== undefined && s.driveSelected >= 0;
  const isApproved = s.approved;

  body.innerHTML = `
    <div>
      <div class="section-head">fuentes</div>
      <div class="three-col">

        <div class="source-card">
          <div class="source-header">
            <span class="source-name">drive propio</span>
            <span class="source-badge ${s.driveAssets.length > 0 ? 'sb-indexed':'sb-waiting'}">${s.driveAssets.length > 0 ? s.driveAssets.length+' coincidencias':'sin coincidencias'}</span>
          </div>
          <div class="source-body" id="driveBody">
            ${s.driveAssets.length === 0
              ? `<div class="drive-empty">${s.driveNote}</div>`
              : s.driveAssets.map((a,di) => `
                <div class="drive-asset ${s.driveSelected===di?'selected':''}" onclick="selectDrive(${di})">
                  <div class="drive-thumb">${a.type==='vid'?'▶':'▣'}</div>
                  <div class="drive-info">
                    <div class="drive-name">${a.name}</div>
                    <div class="drive-score">relevancia ${a.score}${a.recommended?' · recomendado':''}</div>
                  </div>
                  <div class="drive-check ${s.driveSelected===di?'on':''}">
                    ${s.driveSelected===di?'<svg width="8" height="8" viewBox="0 0 8 8"><polyline points="1,4 3,6 7,2" fill="none" stroke="white" stroke-width="1.5"/></svg>':''}
                  </div>
                </div>`).join('')
            }
          </div>
        </div>

        <div class="source-card">
          <div class="source-header">
            <span class="source-name">pinterest mood</span>
            <span class="source-badge ${s.pinUrl ? 'sb-active':'sb-waiting'}">${s.pinUrl ? 'extraído':'sin referencia'}</span>
          </div>
          <div class="source-body">
            <div class="pinterest-area">
              <div class="pin-input-wrap">
                <input class="pin-input" id="pinInput" placeholder="pegar url del pin..." value="${s.pinUrl||''}">
                <button class="pin-btn" onclick="extractMood()">extraer</button>
              </div>
              ${s.pinUrl ? `
              <div class="mood-extracted">
                <div class="mood-palette">
                  ${s.mood.palette.map(c=>`<div class="mood-swatch" style="background:${c}"></div>`).join('')}
                </div>
                <div class="mood-tags">
                  <span class="mood-tag">${s.mood.style}</span>
                  <span class="mood-tag">${s.mood.composition}</span>
                </div>
                <div class="mood-score">alineación emocional ${s.mood.score}/10</div>
              </div>` : `<div class="drive-empty" style="padding:8px 0">sin referencia visual — se usará mood de la curva emocional</div>`}
            </div>
          </div>
        </div>

        <div class="source-card">
          <div class="source-header">
            <span class="source-name">generación IA</span>
            <span class="source-badge ${s.engine!=='none'?'sb-active':'sb-waiting'}">${s.engine==='none'?'no requerido':s.engine}</span>
          </div>
          <div class="source-body">
            ${s.engine === 'none'
              ? `<div class="drive-empty">asset del drive seleccionado — generación no requerida<br><span style="color:var(--peak);font-size:9px;margin-top:4px;display:block">ahorro: $${s.engineCost===0?'0.04 estimado':'0.04'}</span></div>`
              : `<div class="gen-area">
                  <div class="prompt-display">
                    <span style="color:var(--text3)">base: </span><span class="prompt-highlight">${s.mood.style}, ${s.mood.composition}</span><br>
                    <span style="color:var(--text3)">emoción: </span>${s.emotion}, intensidad ${s.intensity}/10<br>
                    <span style="color:var(--text3)">brand: </span>paleta aplicada, no ilustración
                  </div>
                  <div>
                    <div style="font-size:9px;color:var(--text3);margin-bottom:5px">motor seleccionado</div>
                    <div class="engine-select">
                      ${['flux-schnell','flux-pro-1.1','runway-gen3-turbo','firefly'].map(e=>`
                        <button class="engine-btn ${s.engine===e||s.engine===e.replace('gen3-turbo','gen3-alpha-turbo')?'active':''}" onclick="setEngine('${e}')">${e}</button>`).join('')}
                    </div>
                  </div>
                  <div>
                    <button class="gen-btn ${generating?'generating':''}" onclick="generateAssets()" id="genBtn">${generating?'generando...':'generar variantes'}</button>
                    <div class="cost-estimate">costo estimado: ~$${s.engineCost.toFixed(3)} por variante</div>
                  </div>
                </div>`
            }
          </div>
        </div>
      </div>
    </div>

    ${s.variants.length > 0 ? `
    <div>
      <div class="section-head">variantes generadas</div>
      <div class="variants-grid" id="variantsGrid">
        ${s.variants.map((v,vi) => `
          <div class="variant-card ${s.selectedVariant===vi?'selected':''}" onclick="selectVariant(${vi})">
            <div class="variant-thumb ${v.bg}">
              ${s.assetType==='video'?'▶ video':''}
            </div>
            <div class="variant-foot">
              <span class="var-label">variante ${vi+1}</span>
              <span class="var-score">${v.emotion}</span>
            </div>
            <div style="padding:0 8px 8px">
              <div class="compliance-row">
                ${v.compliance.map(c=>`<span class="compliance-chip">${c}</span>`).join('')}
              </div>
              <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:5px">
                <span>brand ${v.brand}</span>
                <span>emoción ${v.emotion}</span>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>` : ''}

    <div>
      <div class="section-head">asset final</div>
      <div class="final-preview">
        <div class="final-header">
          <span class="final-title">${s.assetType === 'video' ? 'video' : 'imagen'} seleccionada</span>
          ${isApproved ? '<span style="font-size:9px;color:var(--peak);font-weight:500">aprobado</span>' : ''}
        </div>
        <div class="final-body">
          <div class="final-thumb-area">
            <div class="final-thumb ${isDriveSelected && s.driveAssets.length > 0 ? 'v-bg2' : s.variants.length > 0 ? s.variants[s.selectedVariant>=0?s.selectedVariant:0].bg : 'v-bg1'}" style="border-radius:5px;aspect-ratio:16/9">
              ${isDriveSelected && s.driveAssets.length > 0
                ? (s.driveAssets[s.driveSelected].type==='vid'?'▶ drive://'+s.driveAssets[s.driveSelected].name:'▣ drive://'+s.driveAssets[s.driveSelected].name)
                : s.variants.length > 0
                  ? (s.assetType==='video'?'▶ generado — '+s.engine:'generado — '+s.engine)
                  : 'pendiente de generación'}
            </div>
          </div>
          <div class="final-meta">
            <div class="meta-row"><span class="meta-key">fuente</span><span class="meta-val">${isDriveSelected && s.driveAssets.length > 0 ? 'drive propio' : s.engine !== 'none' ? s.engine : '—'}</span></div>
            <div class="meta-row"><span class="meta-key">tipo</span><span class="meta-val">${s.assetType}</span></div>
            <div>
              <div style="font-size:9px;color:var(--text3);margin-bottom:4px">brand compliance</div>
              <div class="score-bar-wrap">
                <div class="score-mini-bar"><div class="score-mini-fill" style="width:${s.variants.length>0?(s.variants[s.selectedVariant>=0?s.selectedVariant:0].brand*10)+'%':'70%'}"></div></div>
                <span style="font-size:10px;font-weight:500;color:var(--peak);min-width:28px">${s.variants.length>0?s.variants[s.selectedVariant>=0?s.selectedVariant:0].brand:isDriveSelected?'10.0':'—'}</span>
              </div>
            </div>
            <div>
              <div style="font-size:9px;color:var(--text3);margin-bottom:4px">alineación emocional</div>
              <div class="score-bar-wrap">
                <div class="score-mini-bar"><div class="score-mini-fill" style="width:${s.variants.length>0?(s.variants[s.selectedVariant>=0?s.selectedVariant:0].emotion*10)+'%':'80%'};background:var(--valley)"></div></div>
                <span style="font-size:10px;font-weight:500;color:var(--valley);min-width:28px">${s.variants.length>0?s.variants[s.selectedVariant>=0?s.selectedVariant:0].emotion:isDriveSelected?'9.4':'—'}</span>
              </div>
            </div>
            <button class="approve-btn ${isApproved?'approved':''}" onclick="approveSlot()">
              ${isApproved ? '✓ aprobado' : 'aprobar asset'}
            </button>
          </div>
        </div>
      </div>
    </div>`;
}

function render(){
  renderSidebar();
  renderHeader();
  renderMain();
}

function selectDrive(di){
  const s = slots[activeSlot];
  if(s.driveSelected === di){ s.driveSelected = undefined; }
  else { s.driveSelected = di; s.selectedVariant = -1; }
  render();
}

function selectVariant(vi){
  const s = slots[activeSlot];
  s.selectedVariant = vi;
  s.driveSelected = undefined;
  render();
}

function approveSlot(){
  slots[activeSlot].approved = true;
  render();
}

function extractMood(){
  const url = document.getElementById('pinInput').value;
  if(url){ slots[activeSlot].pinUrl = url; render(); }
}

function setEngine(e){
  slots[activeSlot].engine = e;
  render();
}

function generateAssets(){
  if(generating) return;
  generating = true;
  render();
  setTimeout(()=>{ generating=false; render(); }, 1800);
}

function prevSlot(){ if(activeSlot>0){activeSlot--;render();} }
function nextSlot(){ if(activeSlot<slots.length-1){activeSlot++;render();} }

render();
</script>
</body>
</html>
